<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="Ziya Sadigzade — Co-Founder @ BRUH, CS @ Charles University, Prague">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="55%" stop-color="#12161D"/>
      <stop offset="100%" stop-color="#1A1206"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A317"/>
      <stop offset="50%" stop-color="#FFCF56"/>
      <stop offset="100%" stop-color="#E8A317"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A317" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8A317" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E8A317" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E8A317" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E8A317" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="nameClip">
      <text x="64" y="150" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="72" font-weight="800" letter-spacing="-1.5">Ziya Sadigzade</text>
    </clipPath>

    <clipPath id="card">
      <rect x="0" y="0" width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <style>
    .shine  { animation: sweep 5.5s cubic-bezier(.4,0,.2,1) infinite; }
    .pulse  { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
    .float1 { animation: drift 9s ease-in-out infinite; }
    .float2 { animation: drift 12s ease-in-out infinite reverse; }
    .bar    { animation: grow 5.5s ease-in-out infinite; transform-origin: 64px 190px; }
    .fade   { animation: fade 5.5s ease-in-out infinite; }

    @keyframes sweep { 0% { transform: translateX(-520px); } 60%,100% { transform: translateX(760px); } }
    @keyframes pulse { 0%,100% { opacity: .35; r: 5; } 50% { opacity: 1; r: 6.5; } }
    @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(0,-14px); } }
    @keyframes grow  { 0% { transform: scaleX(.25); } 55%,100% { transform: scaleX(1); } }
    @keyframes fade  { 0%,20% { opacity: 0; } 45%,100% { opacity: .78; } }

    @media (prefers-reduced-motion: reduce) {
      .shine, .pulse, .float1, .float2, .bar, .fade { animation: none; }
      .fade { opacity: .78; }
    }
  </style>

  <g clip-path="url(#card)">
    <rect width="1200" height="280" fill="url(#bg)"/>
    <rect width="1200" height="280" fill="url(#grid)"/>
    <ellipse cx="1030" cy="70" rx="360" ry="220" fill="url(#glow)"/>

    <!-- floating accents -->
    <g class="float1" opacity="0.5">
      <circle cx="960" cy="196" r="3" fill="#FFCF56"/>
      <circle cx="1108" cy="132" r="2" fill="#E8A317"/>
    </g>
    <g class="float2" opacity="0.4">
      <circle cx="1042" cy="82" r="2.5" fill="#FFCF56"/>
      <circle cx="884" cy="118" r="2" fill="#E8A317"/>
    </g>

    <!-- eyebrow -->
    <text x="64" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14" letter-spacing="3.5" fill="#E8A317" opacity="0.85">BAKU → VARNA → PRAGUE</text>

    <!-- name + shine sweep -->
    <text x="64" y="150" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="72" font-weight="800" letter-spacing="-1.5" fill="url(#gold)">Ziya Sadigzade</text>
    <g clip-path="url(#nameClip)">
      <rect class="shine" x="-40" y="70" width="200" height="110" fill="url(#shine)"/>
    </g>

    <!-- animated rule -->
    <rect class="bar" x="64" y="176" width="300" height="3" rx="1.5" fill="url(#rule)"/>

    <!-- subtitle -->
    <text class="fade" x="64" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="17" fill="#C9D1D9">Co-Founder @ BRUH  ·  CS @ Charles University  ·  Prague, CZ</text>

    <!-- status pill -->
    <g transform="translate(1000, 228)">
      <rect x="-14" y="-19" width="176" height="32" rx="16" fill="#161B22" stroke="#E8A317" stroke-opacity="0.35"/>
      <circle class="pulse" cx="6" cy="-3" r="5" fill="#39D353"/>
      <text x="24" y="2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="13" fill="#C9D1D9" letter-spacing="1">shipping daily</text>
    </g>

    <rect x="0.5" y="0.5" width="1199" height="279" rx="16" fill="none" stroke="#E8A317" stroke-opacity="0.28"/>
  </g>
</svg>
