name: Generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure output directory exists
        run: mkdir -p output

      - name: Generate SVGs from contribution grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            output/github-snake.svg?palette=github-light&color_snake=0D1117&color_dots=EBEDF0,9BE9A8,30C463,30C463,216E39
            output/github-snake-dark.svg?palette=github-dark&color_snake=E8A317&color_dots=161B22,0E4429,006D32,26A641,39D353

      # Commits SVGs on the default branch (usually main) → stable raw URL below
      - name: Commit snake SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: output/*.svg
