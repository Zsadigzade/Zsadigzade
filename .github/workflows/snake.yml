name: Generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure output directory exists
        run: mkdir -p output

      - name: Generate SVGs from contribution grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Hex colors live in a query string, so "#" MUST be percent-encoded as %23.
          # Bare hex produced `--cs:E8A317` (invalid CSS) and the whole grid rendered blank.
          outputs: |
            output/github-snake.svg?palette=github-light&color_snake=%230D1117&color_dots=%23EBEDF0,%239BE9A8,%2330C463,%2330C463,%23216E39
            output/github-snake-dark.svg?palette=github-dark&color_snake=%23E8A317&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2339D353

      # Commits SVGs on the default branch (usually main) → stable raw URL below
      - name: Commit snake SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: output/*.svg
